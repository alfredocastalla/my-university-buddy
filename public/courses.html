<!DOCTYPE html>
<html>
<head>
<title>Course List</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Course List</h1>

<div id="courses"></div>

<script>

fetch("/courses")
.then(res => res.json())
.then(data => {

let html = "";

data.forEach(course => {

html += `
<div class="course">
<h3>${course.code}</h3>
<p>${course.name}</p>
<p><b>Instructor:</b> ${course.instructor}</p>
</div>
`;

});

document.getElementById("courses").innerHTML = html;

});

</script>

</body>
</html>
